<!DOCTYPE html>
<html lang="en" data-base="../">

<head>
    <title>Products | Guru and Goodness</title>
    <link rel="stylesheet" href="../css/product.css">
    <script>
        const BASE_PATH = document.documentElement.dataset.base || "./";
    </script>
    <script src="../js/head.js"></script>
</head>

<body>
    <!-- HEADER -->
    <div class="header-wrapper" id="header">

    </div>
    <div class="mobile-menu-overlay" id="mobileMenu">

    </div>
    <section class="gg-product-details">
        <img src="../assets/mandala-half.png" class="about-decor about-decor-left2" alt="">
        <img src="../assets/mandala-leaf.png" class="about-decor about-decor-right" alt="">
        <div class="gg-product-container">
            <!-- Gallery -->
            <div class="gg-product-gallery">
                <div class="gg-product-thumbnails" id="gg-thumbnails">
                </div>
                <div class="gg-product-main-image">
                    <img id="gg-main-image" src="" alt="Product Image">
                    <button class="gg-image-zoom">
                        <i class="fas fa-search-plus"></i>
                    </button>
                </div>

            </div>
            <!-- Content -->

            <div class="gg-product-content">
                <div class="breadcrumb-my">
                    <a href="../">Home</a>
                    <span>›</span>
                    <span id="gg-category">

                    </span>
                </div>

                <div class="gg-product-title-row">
                    <div id="gg-product-name" class="gg-product-name">
                    </div>
                </div>

                <div class="gg-product-rating-row">
                    <div class="gg-stars" id="gg-stars"></div>
                    <span class="gg-rating-score" id="gg-rating"></span>
                    <span class="gg-divider">|</span>
                    <span class="gg-review-count" id="gg-reviews"> </span>
                </div>

                <div class="gg-price-area">
                    <div class="gg-current-price" id="gg-price">
                    </div>
                    <div class="gg-old-price" id="gg-old-price">
                    </div>
                    <div class="gg-discount-badge" id="gg-discount">
                    </div>
                </div>
                <p class="gg-tax-text">
                    Inclusive of all taxes
                </p>

                <p class="gg-product-description" id="gg-description">
                </p>

                <div class="gg-product-benefits" id="gg-benefits">

                    <div class="gg-benefit-tag">
                        <img src="../assets/focus.png" alt="">
                        <span></span>
                    </div>
                    <div class="gg-benefit-tag">
                        <img src="../assets/stress.png" alt="">
                        <span></span>
                    </div>
                    <div class="gg-benefit-tag">
                        <img src="../assets/peace.png" alt="">
                        <span></span>
                    </div>
                    <div class="gg-benefit-tag">
                        <img src="../assets/protection.png" alt="">
                        <span></span>
                    </div>
                </div>

                <div class="gg-product-actions">
                    <div class="gg-qty">
                        <button id="qtyMinus">
                            -
                        </button>
                        <span id="qtyValue">
                            1
                        </span>
                        <button id="qtyPlus">
                            +
                        </button>
                    </div>

                    <div id="whatsappBtn" class="gg-whatsapp-btn">
                        <i class="fab fa-whatsapp"></i>
                        Chat to Buy
                    </div>
                </div>

                <div class="gg-product-features">
                    <div class="gg-feature-item">
                        <img src="../assets/authentic.png" alt="Authentic">
                        <span>100% Authentic</span>
                    </div>
                    <div class="gg-feature-item">
                        <img src="../assets/blessed.png" alt="Blessed">
                        <span>Energized & Blessed</span>
                    </div>
                    <div class="gg-feature-item">
                        <img src="../assets/package.png" alt="Packaging">
                        <span>Secure Packaging</span>
                    </div>
                    <div class="gg-feature-item">
                        <img src="../assets/return.png" alt="Return">
                        <span>7 Days Easy Return</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="gg-benefits-section">
        <div class="gg-benefits-header">
            <span class="gg-benefits-arrow">
                <i class="fa-solid fa-angle-right"></i>
            </span>
            <div class="benefits-title">Benefits</div>
        </div>

        <div class="gg-benefits-grid" id="gg-benefits-grid">

            <div class="gg-benefit-card">
                <div class="gg-benefit-icon">
                    <img src="../assets/spiritual-healing.png">
                </div>
                <div class="gg-benefit-content">
                    <h3></h3>
                    <p></p>
                </div>
            </div>

            <div class="gg-benefit-card">
                <div class="gg-benefit-icon">
                    <img src="../assets/peace.png">
                </div>
                <div class="gg-benefit-content">
                    <h3></h3>
                    <p></p>
                </div>
            </div>

            <div class="gg-benefit-card">
                <div class="gg-benefit-icon">
                    <img src="../assets/meditation-support.png">
                </div>
                <div class="gg-benefit-content">
                    <h3></h3>
                    <p></p>
                </div>
            </div>

            <div class="gg-benefit-card">
                <div class="gg-benefit-icon">
                    <img src="../assets/stress.png">
                </div>
                <div class="gg-benefit-content">
                    <h3></h3>
                    <p></p>
                </div>
            </div>

            <div class="gg-benefit-card">
                <div class="gg-benefit-icon">
                    <img src="../assets/protection.png">
                </div>
                <div class="gg-benefit-content">
                    <h3></h3>
                    <p></p>
                </div>
            </div>

        </div>
    </section>

    <section class="gg-significance-section">
        <div class="gg-significance-content">
            <div class="gg-significance-left">
                <div class="gg-significance-title">
                </div>
                <p class="gg-significance-description">
                </p>
                <div class="gg-significance-tags" id="gg-significance-tags">
                </div>
            </div>
        </div>
    </section>

    <section class="gg-product-specification-section">
        <div class="gg-section-heading">
            <span class="gg-benefits-arrow">
                <i class="fa-solid fa-angle-right"></i>
            </span>
            <div class="benefits-title">Product Details</div>
        </div>
        <div class="gg-specification-layout">
            <div class="gg-specification-card">
                <div id="gg-specification-table">
                </div>
            </div>

            <div class="gg-product-extra-card">
                <div class="founder-note-card">
                    <div class="founder-image">
                        <img src="../assets/founder.png" alt="Founder">
                    </div>
                    <div class="founder-content">
                        <div class="founder-card-title">Founder’s Note</div>
                        <p id="gg-founder-note"></p>
                        <div class="founder-name">
                            – Astro Swarna Santra
                            <span class="founder-role">
                                (Founder)
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="shop-products-section">
        <div class="gg-benefits-header">
            <span class="gg-benefits-arrow">
                <i class="fa-solid fa-angle-right"></i>
            </span>
            <div class="benefits-title">Related Products</div>
        </div>
        <div class="product-grid" id="releatedProducts">

        </div>
    </section>
    <section class="gg-testimonial-section">
        <div class="gg-benefits-header">
            <span class="gg-benefits-arrow">
                <i class="fa-solid fa-angle-right"></i>
            </span>
            <div class="benefits-title">Customer Reviews</div>
        </div>
        <div class="gg-testimonial-grid" id="reviewContainer">

        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer-section" id="footer">

    </footer>

    <script src="../js/component.js"></script>
    <script src="../js/data/review.js"></script>
    <script src="../js/data/product.js"></script>
    <script>
        const whatsappNumber = "91XXXXXXXXXX";
        document.getElementById("whatsappBtn").addEventListener("click", () => {
            const message = `Hi, I want to buy ${product.name}`;
            const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
            window.open(url, "_blank");
        });
        loadProduct();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>

</body>

</html>
